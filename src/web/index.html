<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f14">
  <title>Lumen Operator</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="heartbeat" class="heartbeat">
    <span id="runtime-state" class="heartbeat-state">idle</span>
    <span id="counts" class="heartbeat-counts">
      <span class="count-group"><span class="count-num" id="count-running">0</span> running</span>
      <span class="count-group"><span class="count-num" id="count-queued">0</span> queued</span>
      <span class="count-group" id="blocked-group"><span class="count-num" id="count-blocked">0</span> blocked</span>
      <span class="count-group"><span class="count-num" id="count-retryable">0</span> retry</span>
      <span class="count-group"><span class="count-num" id="count-canceled">0</span> canceled</span>
    </span>
    <span id="conn-indicator" class="conn-indicator" title="connected"></span>
    <button id="pause-toggle" class="pause-toggle" type="button">Pause</button>
    <span id="last-event" class="heartbeat-meta">no events</span>
    <button id="search-toggle" class="icon-btn" aria-label="Search">&#x1F50D;</button>
  </div>

  <div id="search-bar" class="search-bar" hidden>
    <input id="search-input" type="text" placeholder="Search tasks..." autocomplete="off">
    <div class="filter-tabs" role="tablist">
      <button class="filter-tab is-active" data-filter="all" role="tab">All</button>
      <button class="filter-tab" data-filter="running" role="tab">Running</button>
      <button class="filter-tab" data-filter="pending" role="tab">Queued</button>
      <button class="filter-tab" data-filter="blocked" role="tab">Blocked</button>
      <button class="filter-tab" data-filter="completed" role="tab">Done</button>
    </div>
  </div>

  <main>
    <section id="sec-now" class="section collapsible">
      <div class="section-header" role="button" tabindex="0" aria-expanded="true">
        <h2>now</h2>
        <span class="section-count" id="now-count"></span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="section-body">
        <div id="now-tasks" class="task-list"></div>
        <div id="now-workflows" class="workflow-list"></div>
      </div>
    </section>

    <section id="sec-done" class="section collapsible">
      <div class="section-header" role="button" tabindex="0" aria-expanded="true">
        <h2>done</h2>
        <span class="section-count" id="done-count"></span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="section-body">
        <div id="done-tasks" class="task-list"></div>
      </div>
    </section>

    <section id="sec-events" class="section collapsible">
      <div class="section-header" role="button" tabindex="0" aria-expanded="true">
        <h2>events</h2>
        <span class="section-count" id="event-velocity"></span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="section-body">
        <div id="event-list" class="event-list"></div>
      </div>
    </section>
  </main>

  <div id="reply-bar" class="reply-bar">
    <textarea id="reply-input" placeholder="New task..." rows="1" aria-label="New task message"></textarea>
    <button id="reply-send" class="send-btn">&#x27A4;</button>
    <span id="reply-status" class="reply-status" aria-live="polite"></span>
  </div>

  <div id="detail-drawer" class="detail-drawer" hidden>
    <button id="detail-close" class="drawer-close" aria-label="Close">&#x2715;</button>
    <div class="drawer-header">
      <h3 id="detail-title"></h3>
    </div>
    <div id="detail-body" class="drawer-body"></div>
    <div class="drawer-footer">
      <button id="detail-cancel" class="cancel-btn">Cancel</button>
      <button id="detail-reply" class="reply-btn">Reply</button>
      <span id="detail-children" class="children-indicator"></span>
    </div>
  </div>
  <div id="detail-backdrop" class="detail-backdrop" hidden></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
